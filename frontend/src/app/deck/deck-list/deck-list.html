<section class="hero card">
  <div class="hero-content">
    <h1>Flashcards</h1>
    <p class="subtitle">Create decks, add cards, and study with a simple, focused flow.</p>
  </div>
  <div class="hero-actions">
    <div class="new-deck">
      <input [(ngModel)]="newDeckName" placeholder="New deck name" />
      <button class="btn" (click)="createDeck()">Create Deck</button>
    </div>
  </div>
</section>

<section class="card" style="margin-top:16px;">
  <h2>Your decks</h2>

  <div *ngIf="error" class="muted" style="color: #b91c1c; display:flex; gap:8px; align-items:center;">
    <span>{{ error }}</span>
    <button class="btn" (click)="loadDecks()">Retry</button>
  </div>

  <div *ngIf="!error && decks.length === 0" class="muted">No decks yet — create your first deck above.</div>

  <div class="deck-grid">
    <div class="deck-card" *ngFor="let deck of decks">
      <div class="deck-name">{{ deck.name }}</div>
      <div class="deck-actions">
        <button class="btn" (click)="openDeck(deck)">Open</button>
      </div>
    </div>
  </div>
</section>

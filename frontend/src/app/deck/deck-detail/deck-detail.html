<h2>Deck</h2>

<div *ngIf="error" style="color: red;">
  {{ error }}
</div>

<div *ngIf="loading">Loading...</div>

<h3>Add a card</h3>

<div style="display: flex; gap: 8px; flex-direction: column; max-width: 480px;">
  <input [(ngModel)]="front" placeholder="Front (question)" />
  <textarea [(ngModel)]="back" placeholder="Back (answer)"></textarea>
  <button (click)="addCard()">Add Card</button>
</div>

<hr />

<h3>Cards</h3>

<ul>
  <li *ngFor="let c of cards">
    <strong>{{ c.front }}</strong>
    <div>{{ c.back }}</div>
  </li>
</ul>

@if (isAuthPage()) {
  <main class="auth-layout">
    <router-outlet />
  </main>
} @else {
  <div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-logo">📚</div>
        <span class="sidebar-app-name">Flashcards</span>
      </div>
      <div class="sidebar-tagline">Study smarter</div>
    </div>

    <div class="sidebar-section-title">Your Decks</div>

    <div class="sidebar-list">
      <router-outlet name="sidebar"></router-outlet>
    </div>

    <div class="sidebar-footer">
      <span>Built for studying</span>
      @if (authService.isLoggedIn()) {
        <div class="auth-meta">
          <span>{{ authService.email() }}</span>
          <button type="button" (click)="logout()">Logout</button>
        </div>
      } @else {
        <span>Please log in</span>
      }
    </div>

  </aside>

  <div class="main">
    <main class="main-content">
      <router-outlet/>
    </main>
  </div>
</div>
}

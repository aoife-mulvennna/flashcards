<div class="login-page">
  <div class="login-card">
    <h1>{{ isRegisterMode() ? 'Join Flashcards' : 'Welcome back' }}</h1>
    <p>
      {{ isRegisterMode()
        ? 'Create an account and start building study decks.'
        : 'Log in to pick up where you left off.' }}
    </p>

    <form (ngSubmit)="submit()">
      <input [(ngModel)]="email" name="email" type="email" placeholder="Email" required />
      <input [(ngModel)]="password" name="password" type="password" placeholder="Password" required />
      <button type="submit">
        {{ isRegisterMode() ? 'Create account' : 'Log in' }}
      </button>
    </form>

    @if (error()) {
      <p class="error-text">{{ error() }}</p>
    }

    <button type="button" class="link-button" (click)="toggleMode()">
      {{ isRegisterMode() ? 'Already have an account? Log in' : 'Need an account? Register' }}
    </button>
  </div>
</div>

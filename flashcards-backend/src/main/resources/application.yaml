server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/flashcards
    username: flashcards
    password: flashcards
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      indent_output: true
app:
  jwt:
    secret: your-very-long-random-secret-key-should-be-at-least-32-characters
    expiration: 86400000
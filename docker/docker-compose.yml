services:
  db:
    image: postgres:16
    container_name: flashcards-db
    environment:
      POSTGRES_DB: flashcards
      POSTGRES_USER: flashcards
      POSTGRES_PASSWORD: flashcards
    ports:
      - "5432:5432"
    volumes:
      - flashcards_pgdata:/var/lib/postgresql/data

volumes:
  flashcards_pgdata: